name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Build web app
        working-directory: web
        run: npm run build

      - name: Capacitor sync iOS
        working-directory: web
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: web/ios/App

      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep '^Xcode_' | sort -t_ -k2 -V | tail -1)
          echo "Selecting Xcode: $LATEST"
          sudo xcode-select -s "/Applications/$LATEST"
          xcodebuild -version

      - name: Decode distribution certificate
        working-directory: web/ios/App
        run: echo "${{ secrets.DIST_CERT_P12_BASE64 }}" | base64 --decode > distribution.p12

      - name: Build & Upload to TestFlight
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: bundle exec fastlane beta
